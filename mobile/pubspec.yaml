name: orcamento_app
description: App de controle de orçamento diário
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  intl: ^0.18.1
  flutter_speed_dial: ^6.1.0
  http: ^1.2.2
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.2
  flutter_timezone: ^5.0.2
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - .env
