<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030813" />
      <stop offset="58%" stop-color="#081a3a" />
      <stop offset="100%" stop-color="#040f27" />
    </linearGradient>

    <radialGradient id="glow-left" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 120) rotate(26) scale(780 520)">
      <stop offset="0%" stop-color="#2e6fe8" stop-opacity="0.42" />
      <stop offset="100%" stop-color="#2e6fe8" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glow-right" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1700 20) rotate(162) scale(760 560)">
      <stop offset="0%" stop-color="#57b8ff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#57b8ff" stop-opacity="0" />
    </radialGradient>

    <pattern id="mesh" width="84" height="84" patternUnits="userSpaceOnUse">
      <path d="M84 0H0V84" fill="none" stroke="#7ea7e8" stroke-opacity="0.08" stroke-width="1" />
    </pattern>

    <filter id="noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="23" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.1" />
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1920" height="1200" fill="url(#base)" />
  <rect width="1920" height="1200" fill="url(#mesh)" />
  <rect width="1920" height="1200" fill="url(#glow-left)" />
  <rect width="1920" height="1200" fill="url(#glow-right)" />

  <path
    d="M-80 930C270 710 640 1180 1020 1010C1370 850 1650 980 2010 860"
    fill="none"
    stroke="#4ea0ff"
    stroke-opacity="0.2"
    stroke-width="72"
  />
  <path
    d="M-120 520C280 410 640 710 1060 620C1460 530 1730 690 2060 580"
    fill="none"
    stroke="#2b69df"
    stroke-opacity="0.16"
    stroke-width="56"
  />

  <rect width="1920" height="1200" filter="url(#noise)" />
</svg>
