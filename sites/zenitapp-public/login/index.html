<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecionando para o app | Zenit App</title>
  <meta http-equiv="refresh" content="0;url=https://calc.zenitapp.net/login" />
  <meta name="theme-color" content="#07112a" />
  <link rel="icon" type="image/png" href="/assets/images/logo_principal.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <section class="panel center">
      <a class="brand brand-compact center-brand" href="/" aria-label="Voltar para home do Zenit">
        <img class="brand-logo" src="/assets/images/logo_principal.png" alt="Logo oficial do Zenit App" />
      </a>
      <p class="eyebrow">Acesso seguro</p>
      <h1 class="title">Redirecionando para a aplicação</h1>
      <p class="subtitle">Você será encaminhado para o login do Zenit em instantes.</p>
      <p class="actions">
        <a class="btn" href="https://calc.zenitapp.net/login">Ir para login</a>
      </p>
    </section>
  </main>

  <script>
    (function () {
      var target = 'https://calc.zenitapp.net/login';
      if (window.location.search) {
        target += window.location.search;
      }
      window.location.replace(target);
    })();
  </script>
</body>
</html>
